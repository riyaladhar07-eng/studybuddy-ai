<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyBuddy AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#0b1120;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

header{
background:#111827;
padding:18px;
text-align:center;
font-size:28px;
font-weight:bold;
color:#38bdf8;
border-bottom:1px solid #1e293b;
}

#chat{
flex:1;
overflow-y:auto;
padding:20px;
background:linear-gradient(to bottom,#0b1120,#111827);
}

.msg{
padding:14px;
margin:10px 0;
border-radius:16px;
max-width:80%;
line-height:1.6;
}

.user{
background:#2563eb;
margin-left:auto;
}

.ai{
background:#1e293b;
border:1px solid #334155;
}

#inputBox{
display:flex;
padding:15px;
background:#0f172a;
border-top:1px solid #1e293b;
}

input{
flex:1;
padding:14px;
border:none;
border-radius:12px;
background:#1e293b;
color:white;
font-size:16px;
outline:none;
}

button{
padding:14px 22px;
margin-left:10px;
border:none;
border-radius:12px;
background:#38bdf8;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

</style>
</head>

<body>

<header>🤖 StudyBuddy AI</header>

<div id="chat">
<div class="msg ai">
Hello! I am StudyBuddy AI. Ask me about AI, programming, web development, cybersecurity, cloud computing, databases, Korea, study tips, and technology.
</div>
</div>

<div id="inputBox">
<input type="text" id="input" placeholder="Ask anything..." onkeypress="handleEnter(event)">
<button onclick="sendMessage()">Send</button>
</div>

<script>

function handleEnter(event){
if(event.key==="Enter"){
sendMessage();
}
}

function sendMessage(){

const input=document.getElementById("input");
const text=input.value.trim();

if(text==="") return;

const chat=document.getElementById("chat");

chat.innerHTML+=`
<div class="msg user">${text}</div>
`;

input.value="";

setTimeout(()=>{
chat.innerHTML+=`
<div class="msg ai">${getResponse(text.toLowerCase())}</div>
`;
chat.scrollTop=chat.scrollHeight;
},500);

chat.scrollTop=chat.scrollHeight;
}

function getResponse(text){

if(text.includes("hello") || text.includes("hi") || text.includes("hey"))
return "Hello 👋 Welcome to StudyBuddy AI.";

if(text.includes("ai"))
return "Artificial Intelligence enables machines to learn, reason, and solve problems.";

if(text.includes("machine learning"))
return "Machine Learning is a branch of AI where systems learn patterns from data.";

if(text.includes("deep learning"))
return "Deep Learning uses neural networks with multiple layers.";

if(text.includes("python"))
return "Python is widely used in AI, automation, data science, and web development.";

if(text.includes("java"))
return "Java is used for Android development and enterprise software.";

if(text.includes("c++"))
return "C++ is popular for game development and high-performance software.";

if(text.includes("javascript"))
return "JavaScript adds interactivity and dynamic features to websites.";

if(text.includes("html"))
return "HTML creates the structure of web pages.";

if(text.includes("css"))
return "CSS styles and designs websites.";

if(text.includes("programming"))
return "Programming is the process of writing instructions for computers.";

if(text.includes("variable"))
return "A variable stores data values inside a program.";

if(text.includes("function"))
return "A function is a reusable block of code.";

if(text.includes("loop"))
return "A loop repeats a block of code multiple times.";

if(text.includes("array"))
return "An array stores multiple values in a single variable.";

if(text.includes("algorithm"))
return "An algorithm is a step-by-step procedure for solving a problem.";

if(text.includes("database"))
return "A database stores information electronically.";

if(text.includes("sql"))
return "SQL is used to manage and query databases.";

if(text.includes("github"))
return "GitHub hosts and manages code repositories.";

if(text.includes("git"))
return "Git tracks changes in source code.";

if(text.includes("cybersecurity"))
return "Cybersecurity protects systems and networks from attacks.";

if(text.includes("cloud"))
return "Cloud computing provides computing services over the internet.";

if(text.includes("aws"))
return "AWS is Amazon's cloud computing platform.";

if(text.includes("azure"))
return "Azure is Microsoft's cloud platform.";

if(text.includes("robot"))
return "Robots use sensors, software, and AI to perform tasks.";

if(text.includes("blockchain"))
return "Blockchain is a decentralized digital ledger.";

if(text.includes("chatgpt"))
return "ChatGPT is an AI language model that understands and generates text.";

if(text.includes("korea"))
return "Korea is known for advanced technology and world-class universities.";

if(text.includes("skku"))
return "SKKU is one of South Korea's leading universities.";

if(text.includes("study plan"))
return "A good study plan includes consistency, revision, and practice.";

if(text.includes("motivation"))
return "Small daily progress creates long-term success.";

return "I can answer questions about AI, programming, web development, cybersecurity, cloud computing, databases, technology, Korea, and study skills.";

}

</script>

</body>
</html>
